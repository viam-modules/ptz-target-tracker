name: Build

concurrency:
  group: build-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      # One entry per platform in meta.json's `build.arch`. The rdk dependency
      # chain needs cgo, so linux and darwin build natively on a matching
      # runner. windows/amd64 is the exception: the Makefile's VIAM_TARGET_OS
      # path builds it with `-tags no_cgo`, so it cross-compiles from linux.
      matrix:
        include:
          - name: linux/amd64
            label: linux-amd64
            runner: ubuntu-latest
          - name: linux/arm64
            label: linux-arm64
            runner: ubuntu-24.04-arm
          - name: darwin/arm64
            label: darwin-arm64
            runner: macos-latest
          - name: windows/amd64
            label: windows-amd64
            runner: ubuntu-latest
            target_os: windows
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: make setup
        run: make setup

      - name: make build
        run: make build
        env:
          VIAM_TARGET_OS: ${{ matrix.target_os }}
